<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#dff4ff">
  <title>みんなでかんがえよう！SSTすごろく</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section id="setupScreen" class="screen active">
      <div class="setup-card">
        <p class="series-label">みんなでかんがえよう！</p>
        <h1>SSTすごろく</h1>
        <p class="lead">プレイヤーを設定して、みんなでスタート！</p>

        <div class="count-row" aria-label="プレイヤー人数">
          <button class="count-btn" data-count="2">2人</button>
          <button class="count-btn selected" data-count="3">3人</button>
          <button class="count-btn" data-count="4">4人</button>
          <button class="count-btn" data-count="5">5人</button>
        </div>

        <div id="playerInputs" class="player-inputs"></div>

        <button id="startBtn" class="primary-btn">スタート</button>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <header class="topbar">
        <div>
          <p class="series-label">みんなでかんがえよう！</p>
          <h1>SSTすごろく</h1>
        </div>
        <div class="top-actions">
          <button id="fullscreenBtn" class="icon-btn" aria-label="全画面">⛶</button>
          <button id="resetBtn" class="icon-btn" aria-label="最初から">↻</button>
        </div>
      </header>

      <div class="game-layout">
        <section class="board-panel">
          <div class="board-title-row">
            <div id="turnBadge" class="turn-badge"></div>
            <div id="statusText" class="status-text">サイコロをふってね</div>
          </div>

          <div id="board" class="board" aria-label="すごろく盤"></div>

          <button id="diceBtn" class="dice-btn">
            <span id="diceFace" class="dice-face">⚄</span>
            <span id="diceLabel">サイコロをふる</span>
          </button>
        </section>

        <aside class="side-panel">
          <h2>じゅんばん</h2>
          <div id="playerList" class="player-list"></div>

          <div class="legend">
            <h3>マスのしゅるい</h3>
            <div><span class="legend-icon intro">👋</span>自己紹介</div>
            <div><span class="legend-icon sst">💭</span>SST問題</div>
            <div><span class="legend-icon move">🏃</span>運動</div>
            <div><span class="legend-icon event">⭐</span>イベント</div>
          </div>
        </aside>
      </div>
    </section>

    <section id="shuffleOverlay" class="overlay" aria-hidden="true">
      <div class="shuffle-box">
        <p id="shuffleTitle" class="shuffle-title">おだいを えらんでいるよ…</p>
        <div id="shuffleCards" class="shuffle-cards">
          <div class="shuffle-card">?</div>
          <div class="shuffle-card">?</div>
          <div class="shuffle-card">?</div>
          <div class="shuffle-card">?</div>
          <div class="shuffle-card">?</div>
        </div>
      </div>
    </section>

    <section id="taskOverlay" class="overlay" aria-hidden="true">
      <div class="task-card">
        <button id="closeTaskBtn" class="close-btn" aria-label="次のプレイヤーへ">×</button>
        <div id="taskGenre" class="task-genre"></div>
        <div id="taskVisual" class="task-visual">
          <img id="taskImage" alt="" hidden>
          <div id="taskEmoji" class="task-emoji">💭</div>
        </div>
        <h2 id="taskTitle"></h2>
        <p id="taskText"></p>
        <p class="next-help">おわったら右上の × をおしてね</p>
      </div>
    </section>

    <section id="goalOverlay" class="overlay" aria-hidden="true">
      <div class="goal-card">
        <div class="goal-emoji">🎉</div>
        <h2 id="goalTitle">ゴール！</h2>
        <p>みんなで拍手しよう！</p>
        <button id="goalCloseBtn" class="primary-btn">つづける</button>
      </div>
    </section>
  </main>

  <script src="data/questions.js"></script>
  <script src="app.js"></script>
</body>
</html>

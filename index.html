<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#dff3e5">
  <title>みんなですごろく V2.0</title>
  <link rel="stylesheet" href="styles.css?v=2.0.0">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <p class="series">みんなでシリーズ</p>
      <h1>みんなですごろく！</h1>
    </div>
    <div class="top-actions">
      <button id="fullscreenBtn" type="button" aria-label="全画面表示">⛶</button>
      <button id="settingsBtn" type="button" aria-label="設定">⚙</button>
    </div>
  </header>

  <main class="game-layout">
    <section class="board-panel" aria-label="すごろく盤面">
      <div class="board-head">
        <div class="start-label">スタート</div>
        <div id="turnLabel" class="turn-label">あかさんの ばん</div>
        <div class="goal-label">ゴールまで <strong id="remainingLabel">20</strong> マス</div>
      </div>
      <div id="board" class="board"></div>
    </section>

    <aside class="side-panel">
      <section class="players-card">
        <h2>じゅんばん</h2>
        <div id="playersList" class="players-list"></div>
      </section>
      <button id="rollBtn" class="roll-btn" type="button">
        <span class="dice-icon">⚄</span>
        <span>サイコロを ふる</span>
      </button>
      <button id="nextTurnBtn" class="next-turn-btn" type="button" disabled>つぎのひとへ</button>
    </aside>
  </main>
</div>

<div id="diceScreen" class="overlay" aria-hidden="true">
  <div class="dice-stage">
    <p id="dicePrompt">いくつ すすめるかな？</p>
    <div id="diceCube" class="dice-cube" aria-label="サイコロ">
      <div class="face face-1">●</div><div class="face face-2">●<br>●</div><div class="face face-3">●<br>●<br>●</div>
      <div class="face face-4">● ●<br>● ●</div><div class="face face-5">● ●<br>●<br>● ●</div><div class="face face-6">● ●<br>● ●<br>● ●</div>
    </div>
    <div id="diceResult" class="dice-result" aria-live="polite"></div>
    <button id="moveBtn" class="move-btn" type="button" hidden>こまを すすめる</button>
  </div>
</div>

<div id="questionScreen" class="overlay" aria-hidden="true">
  <article class="question-card">
    <div id="questionCategory" class="question-category"></div>
    <div id="questionIcon" class="question-icon"></div>
    <p id="questionText" class="question-text"></p>
    <p id="questionHint" class="question-hint"></p>
    <button id="questionDoneBtn" class="done-btn" type="button">できた！</button>
  </article>
</div>

<div id="settingsScreen" class="overlay" aria-hidden="true">
  <section class="settings-card">
    <h2>はじめる じゅんび</h2>
    <label>あそぶ にんずう
      <select id="playerCount">
        <option value="2">2にん</option><option value="3" selected>3にん</option><option value="4">4にん</option><option value="5">5にん</option>
      </select>
    </label>
    <div id="nameInputs" class="name-inputs"></div>
    <p class="input-note">ひらがな8もじまで。カタカナはひらがなになります。</p>
    <div class="settings-actions">
      <button id="cancelSettingsBtn" type="button">もどる</button>
      <button id="applySettingsBtn" class="primary" type="button">このメンバーで はじめる</button>
    </div>
  </section>
</div>

<script src="questions.js?v=2.0.0"></script>
<script src="script.js?v=2.0.0"></script>
</body>
</html>

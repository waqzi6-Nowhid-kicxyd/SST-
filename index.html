<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#dff4ee">
<title>みんなでかんがえよう！ SSTすごろく v3.4</title>
<style>
:root{
  --ink:#42515a;
  --cream:#fffdf6;
  --line:#8d765f;
  --panel:#fffaf0;
  --shadow:0 10px 28px rgba(71,91,99,.16);
  --intro:#ffe29a;
  --event:#ffb9cf;
  --sst:#aeddff;
  --challenge:#bfe9b4;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;overscroll-behavior:none;touch-action:none;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;color:var(--ink);background:#dfeee8}
button,input{font:inherit}
button{touch-action:manipulation}
#app{
  width:100vw;height:100vh;position:relative;overflow:hidden;
  background:
    radial-gradient(circle at 12% 16%,rgba(255,255,255,.82) 0 3.2%,transparent 3.5%),
    radial-gradient(circle at 78% 12%,rgba(255,255,255,.65) 0 2.8%,transparent 3.1%),
    radial-gradient(circle at 88% 28%,rgba(255,244,190,.45) 0 4.2%,transparent 4.6%),
    linear-gradient(#dff5ff 0 27%,#d8efcc 27% 100%);
}
#app::before{
  content:"";position:absolute;left:0;right:0;bottom:0;height:34%;
  background:
    radial-gradient(ellipse at 12% 100%,#aacb91 0 35%,transparent 36%),
    radial-gradient(ellipse at 52% 100%,#b8d6a1 0 42%,transparent 43%),
    radial-gradient(ellipse at 88% 100%,#9fc389 0 40%,transparent 41%);
  opacity:.78;pointer-events:none
}
.topbar{
  position:absolute;z-index:15;top:0;left:0;right:0;height:8.5vh;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.2vw;background:rgba(255,253,246,.91);
  border-bottom:3px solid rgba(255,190,116,.35);backdrop-filter:blur(7px);
  box-shadow:0 4px 14px rgba(91,111,118,.08)
}
.brand{display:flex;align-items:center;gap:.8vw}
.brand h1{font-size:clamp(20px,2.05vw,38px);margin:0;letter-spacing:.03em}
.brand .subtitle{font-size:clamp(11px,.95vw,18px);opacity:.72}
.top-actions{display:flex;gap:.7vw}
.icon-btn{
  width:clamp(42px,3.6vw,66px);height:clamp(42px,3.6vw,66px);
  border:2px solid rgba(73,85,81,.23);border-radius:50%;
  background:rgba(255,255,255,.78);cursor:pointer;font-size:clamp(19px,1.55vw,29px)
}
.main{
  position:absolute;inset:8.5vh 0 0 0;display:grid;
  grid-template-columns:minmax(0,1fr) minmax(230px,22vw);gap:1.25vw;
  padding:1.25vw
}
.board-wrap{
  position:relative;min-width:0;border-radius:2.1vw;overflow:hidden;
  background:rgba(255,255,255,.27);
  border:4px solid rgba(255,255,255,.72);
  box-shadow:inset 0 0 0 2px rgba(124,173,185,.10),0 12px 30px rgba(71,91,99,.10)
}
.board{
  position:absolute;inset:0;padding:2.1% 2.6%;
  display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(4,1fr);
  gap:2.5% 1.7%;align-items:center;justify-items:center
}
.route-line{
  position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.42
}
.space{
  position:relative;width:min(9.2vw,15.8vh);aspect-ratio:1.38/1;
  border-radius:17%;border:clamp(2px,.22vw,4px) solid rgba(110,87,65,.72);
  background:var(--cream);
  box-shadow:
    0 .42vw 0 rgba(104,80,55,.24),
    0 .72vw 1.25vw rgba(64,72,68,.16),
    inset 0 0 0 clamp(2px,.18vw,4px) rgba(255,255,255,.68);
  display:flex;align-items:center;justify-content:center;z-index:2;
  transform:rotate(var(--tilt,0deg));
  overflow:hidden
}
.space::before{
  content:"";position:absolute;left:8%;right:8%;top:8%;height:18%;
  border-radius:999px;background:rgba(255,255,255,.48);
  box-shadow:0 2px 0 rgba(255,255,255,.35);pointer-events:none
}
.space::after{
  content:"";position:absolute;inset:8%;
  border:2px solid rgba(255,255,255,.62);border-radius:13%;
  box-shadow:inset 0 0 0 2px rgba(91,71,53,.10);pointer-events:none
}
.space .icon{
  position:relative;z-index:1;font-size:clamp(22px,3.1vw,58px);line-height:1;
  filter:drop-shadow(0 2px 0 rgba(255,255,255,.85))
}
.space.start,.space.goal{background:linear-gradient(145deg,#fff9cc,#ffe78e)}
.space.start .label,.space.goal .label{
  font-weight:900;font-size:clamp(12px,1.25vw,23px);text-align:center;line-height:1.1
}
.space.intro{background:linear-gradient(145deg,#fff2bd,var(--intro))}
.space.event{background:linear-gradient(145deg,#ffdbe7,var(--event))}
.space.sst{background:linear-gradient(145deg,#ddf3ff,var(--sst))}
.space.challenge{background:linear-gradient(145deg,#e3f7dd,var(--challenge))}
.tokens{position:absolute;inset:0;z-index:4;pointer-events:none}
.token{
  --x:50%;--y:50%;
  position:absolute;left:var(--x);top:var(--y);width:clamp(37px,3.9vw,72px);aspect-ratio:1;
  transform:translate(-50%,-67%);
  border-radius:50% 50% 46% 46%;
  border:clamp(3px,.28vw,5px) solid white;
  box-shadow:0 .35vw .7vw rgba(38,46,44,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(20px,2.25vw,42px);font-weight:900;color:white;
  transition:left .42s cubic-bezier(.22,.8,.28,1),top .42s cubic-bezier(.22,.8,.28,1);
}
.token::after{
  content:"";position:absolute;width:44%;height:20%;bottom:-16%;left:28%;
  border-radius:50%;background:rgba(47,55,52,.22);filter:blur(2px)
}
.token.pulse{animation:tokenHop .42s ease}
@keyframes tokenHop{50%{transform:translate(-50%,-92%) scale(1.08)}}

.players{
  border-radius:2vw;padding:1.1vw;background:rgba(255,253,246,.88);
  border:4px solid rgba(255,255,255,.74);backdrop-filter:blur(6px);overflow:hidden;
  box-shadow:0 12px 28px rgba(71,91,99,.10)
}
.players h2{margin:.25vw 0 .9vw;font-size:clamp(17px,1.5vw,29px);text-align:center}
.player-list{display:flex;flex-direction:column;gap:.72vw}
.player-card{
  display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:.72vw;
  min-height:clamp(60px,7.2vh,86px);padding:.55vw .7vw;border-radius:1.25vw;
  background:linear-gradient(145deg,rgba(255,255,255,.96),rgba(255,248,232,.88));
  border:3px solid rgba(232,205,164,.42);
  box-shadow:0 4px 10px rgba(84,99,102,.08);
  transition:.25s
}
.player-card.active{border-color:#7b62c7;background:#fff;box-shadow:0 0 0 4px rgba(123,98,199,.12),0 5px 12px rgba(84,99,102,.10)}
.player-card.finished{opacity:.64}
.player-dot{width:clamp(37px,3.2vw,58px);aspect-ratio:1;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 5px #9997}
.player-name{font-size:clamp(14px,1.35vw,25px);font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status{font-size:clamp(12px,.95vw,17px);opacity:.68}
.turn-chip{
  display:none;padding:.24em .5em;border-radius:999px;background:#7758bc;color:white;
  font-size:clamp(10px,.8vw,15px);font-weight:900
}
.player-card.active .turn-chip{display:block}

.hint{
  position:absolute;z-index:10;left:50%;bottom:2.3%;transform:translateX(-50%);
  padding:.55em 1.25em;border-radius:999px;background:rgba(255,250,240,.92);
  box-shadow:var(--shadow);font-weight:900;font-size:clamp(14px,1.25vw,23px);
  transition:.2s;pointer-events:none
}
.hint.hidden{opacity:0;transform:translate(-50%,15px)}

.overlay{
  position:absolute;inset:0;z-index:40;background:rgba(36,43,41,.36);
  display:flex;align-items:center;justify-content:center;padding:3vw;
  opacity:0;visibility:hidden;transition:.22s;backdrop-filter:blur(3px)
}
.overlay.show{opacity:1;visibility:visible}
.modal{
  width:min(840px,75vw);min-height:min(500px,69vh);border-radius:3vw;
  background:rgba(255,250,240,.97);box-shadow:0 22px 65px rgba(25,30,28,.28);
  border:4px solid rgba(255,255,255,.85);display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:3vw;position:relative
}
.modal h2{font-size:clamp(28px,3vw,58px);margin:.3em 0}
.modal p{font-size:clamp(17px,1.65vw,31px);margin:.25em 0}
.big-die{
  width:clamp(180px,20vw,330px);aspect-ratio:1;border-radius:18%;
  background:#fff;border:clamp(5px,.55vw,10px) solid #5c5f5e;
  box-shadow:0 1.1vw 0 #c4c8c7,0 2vw 3vw rgba(35,39,38,.2);
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  padding:14%;gap:5%;margin:1vw
}
.pip{width:58%;aspect-ratio:1;border-radius:50%;background:#464d4b;align-self:center;justify-self:center;opacity:0}
.pip.on{opacity:1}
.big-die.rolling{animation:roll .18s linear infinite}
@keyframes roll{0%{transform:rotate(-5deg) scale(.98)}50%{transform:rotate(5deg) scale(1.03)}100%{transform:rotate(-5deg) scale(.98)}}
.tap-note{margin-top:1.4em!important;font-weight:900;color:#6f5da6}
.confirm-die{transform:scale(.72);margin:-2vw 0}
.shuffle-stage{display:flex;align-items:center;justify-content:center;height:270px;width:100%;position:relative}
.shuffle-card{
  --card-color:#bfe8ff;
  position:absolute;width:clamp(150px,16vw,250px);aspect-ratio:.72;border-radius:1.5vw;
  border:clamp(5px,.45vw,8px) solid #fff;box-shadow:0 12px 25px rgba(42,48,46,.22);
  background:
    repeating-linear-gradient(45deg,rgba(255,255,255,.22) 0 8px,transparent 8px 16px),
    repeating-linear-gradient(-45deg,rgba(255,255,255,.12) 0 8px,transparent 8px 16px),
    var(--card-color);
}
.shuffle-card::before{
  content:"";position:absolute;inset:8%;border:3px solid rgba(255,255,255,.9);border-radius:1vw;
  box-shadow:inset 0 0 0 3px rgba(73,72,66,.12)
}
.shuffle-card::after{
  content:"✦";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.94);font-size:clamp(46px,5.2vw,88px);text-shadow:0 3px 0 rgba(73,72,66,.16)
}
.shuffle-card:nth-child(1){animation:shuffle1 .72s ease-in-out infinite}
.shuffle-card:nth-child(2){animation:shuffle2 .72s ease-in-out infinite}
.shuffle-card:nth-child(3){animation:shuffle3 .72s ease-in-out infinite}
@keyframes shuffle1{0%,100%{transform:translateX(-42%) rotate(-8deg)}50%{transform:translateX(38%) rotate(7deg)}}
@keyframes shuffle2{0%,100%{transform:translateX(0) rotate(2deg)}50%{transform:translateX(-35%) rotate(-5deg)}}
@keyframes shuffle3{0%,100%{transform:translateX(42%) rotate(8deg)}50%{transform:translateX(0) rotate(1deg)}}
.prompt-card{justify-content:flex-start;padding-top:2.2vw}
.prompt-badge{font-size:clamp(18px,1.55vw,29px);font-weight:900;padding:.4em .9em;border-radius:999px;background:#e7defc}
.prompt-text{
  font-size:clamp(28px,3vw,56px)!important;line-height:1.45;font-weight:900;
  margin:auto 1vw!important
}
.close-btn{
  position:absolute;right:1.3vw;top:1.3vw;width:clamp(52px,4.6vw,78px);aspect-ratio:1;
  border-radius:50%;border:0;background:#e56a6a;color:white;font-size:clamp(24px,2.3vw,43px);
  cursor:pointer;box-shadow:0 .35vw 0 #a64a4a
}
.next-name{font-size:clamp(46px,6vw,110px)!important;line-height:1.2}
.goal-title{font-size:clamp(38px,4.5vw,84px)!important}
.confetti{font-size:clamp(50px,7vw,120px)}
.setup{z-index:60;background:rgba(220,238,232,.97)}
.setup .modal{width:min(900px,88vw);min-height:auto;max-height:90vh;overflow:auto;justify-content:flex-start}
.setup h2{font-size:clamp(25px,2.5vw,48px)}
.setup-row{display:grid;grid-template-columns:1fr 1fr;gap:1vw;width:100%;margin:.45vw 0}
.setup label{display:flex;flex-direction:column;text-align:left;font-weight:900;gap:.35em}
.setup input,.setup select{
  width:100%;border:2px solid #c6cec9;background:#fff;border-radius:1vw;padding:.75em .9em;
  font-size:clamp(16px,1.3vw,24px)
}
.start-btn{
  margin-top:1.4vw;border:0;border-radius:999px;background:#5d9e7e;color:white;
  padding:.75em 2.2em;font-size:clamp(20px,1.7vw,32px);font-weight:900;
  box-shadow:0 .42vw 0 #3f745c;cursor:pointer
}
.small{font-size:clamp(12px,.95vw,18px)!important;opacity:.72}

@media (orientation:portrait) and (max-width:900px){
  html,body{
    width:100%;
    height:auto;
    min-height:100%;
    overflow-x:hidden;
    overflow-y:auto;
    overscroll-behavior-y:auto;
    touch-action:pan-y;
    -webkit-overflow-scrolling:touch;
  }
  #app{
    width:100%;
    height:auto;
    min-height:100dvh;
    overflow:visible;
    padding-top:72px;
  }
  .topbar{
    position:fixed;
    height:72px;
    padding:0 10px;
  }
  .brand h1{font-size:24px}
  .brand .subtitle{display:none}
  .top-actions{gap:6px}
  .icon-btn{width:48px;height:48px;font-size:22px}
  .main{
    position:relative;
    inset:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    padding:12px;
  }
  .board-wrap{
    width:100%;
    height:720px;
    min-height:720px;
    border-radius:18px;
    overflow:hidden;
  }
  .players{
    width:100%;
    min-height:auto;
    padding:12px;
    border-radius:18px;
    overflow:visible;
  }
  .player-list{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .player-card{
    min-height:70px;
    padding:8px;
    border-radius:14px;
  }
  .space{
    width:min(15vw,72px);
  }
  .space .icon{font-size:clamp(24px,8vw,40px)}
  .hint{
    position:absolute;
    bottom:14px;
    max-width:80%;
    text-align:center;
  }
  .overlay{
    position:fixed;
  }
}

@media (max-aspect-ratio: 4/3){
  .main{grid-template-columns:minmax(0,1fr) minmax(190px,27vw)}
  .brand .subtitle{display:none}
}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div style="font-size:clamp(26px,2.7vw,50px)">💬</div>
      <div><h1>みんなでかんがえよう！</h1><div class="subtitle">SSTすごろく</div></div>
    </div>
    <div class="top-actions">
      <button id="soundBtn" class="icon-btn" type="button" aria-label="音のオン・オフ">🔊</button>
      <button id="settingsBtn" class="icon-btn" type="button" aria-label="プレイヤー設定">⚙️</button>
      <button id="resetBtn" class="icon-btn" type="button" aria-label="最初から">↩️</button>
    </div>
  </header>

  <main class="main">
    <section class="board-wrap" id="boardWrap" aria-label="すごろく盤">
      <svg class="route-line" id="routeLine" aria-hidden="true"></svg>
      <div class="board" id="board"></div>
      <div class="tokens" id="tokens"></div>
      <div class="hint" id="hint">画面をタップしてサイコロを振ろう</div>
    </section>

    <aside class="players">
      <h2>プレイヤー</h2>
      <div class="player-list" id="playerList"></div>
    </aside>
  </main>

  <div class="overlay setup show" id="setupOverlay">
    <div class="modal">
      <h2>プレイヤーを決めよう</h2>
      <p class="small">2〜5人の名前を入力してください</p>
      <div style="width:100%;max-width:720px">
        <label>人数
          <select id="playerCount">
            <option value="2">2人</option><option value="3">3人</option>
            <option value="4">4人</option><option value="5">5人</option>
          </select>
        </label>
        <div id="nameInputs"></div>
      </div>
      <button class="start-btn" id="startBtn" type="button">はじめる</button>
    </div>
  </div>

  <div class="overlay" id="diceOverlay">
    <div class="modal" id="diceModal">
      <h2 id="dicePlayerName">○○さん</h2>
      <div class="big-die" id="bigDie" aria-label="サイコロ">
        <i class="pip"></i><i class="pip"></i><i class="pip"></i>
        <i class="pip"></i><i class="pip"></i><i class="pip"></i>
        <i class="pip"></i><i class="pip"></i><i class="pip"></i>
      </div>
      <p id="diceMessage">サイコロを振っています…</p>
    </div>
  </div>

  <div class="overlay" id="confirmOverlay">
    <div class="modal">
      <h2 id="confirmName">○○さん</h2>
      <div class="big-die confirm-die" id="confirmDie">
        <i class="pip"></i><i class="pip"></i><i class="pip"></i>
        <i class="pip"></i><i class="pip"></i><i class="pip"></i>
        <i class="pip"></i><i class="pip"></i><i class="pip"></i>
      </div>
      <p style="font-weight:900;font-size:clamp(27px,3vw,57px)">いくつすすめる？</p>
      <p class="tap-note">画面をタップすると進みます</p>
    </div>
  </div>

  <div class="overlay" id="shuffleOverlay">
    <div class="modal">
      <h2>お題をえらんでいます</h2>
      <div class="shuffle-stage">
        <div class="shuffle-card"></div>
        <div class="shuffle-card"></div>
        <div class="shuffle-card"></div>
      </div>
    </div>
  </div>

  <div class="overlay" id="promptOverlay">
    <div class="modal prompt-card">
      <button id="closePromptBtn" class="close-btn" type="button" aria-label="お題を閉じる">✕</button>
      <div class="prompt-badge" id="promptBadge">💬 SST</div>
      <p class="prompt-text" id="promptText"></p>
    </div>
  </div>

  <div class="overlay" id="nextOverlay">
    <div class="modal">
      <p class="small">つぎは</p>
      <h2 class="next-name" id="nextName"></h2>
    </div>
  </div>

  <div class="overlay" id="goalOverlay">
    <div class="modal">
      <div class="confetti">🎉</div>
      <h2 class="goal-title" id="goalName"></h2>
      <p style="font-weight:900">ゴール！</p>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const QUESTIONS = {
    intro: [
      'すきなたべものは？','すきなのみものは？','すきなくだものは？','すきなおやつは？','すきなどうぶつは？',
      'すきなのりものは？','すきないろは？','おなまえを おしえてね','なんさいかな？','すきなえほんは？'
    ],
    challenge: [
      '10まで かぞえよう','5まで うしろから かぞえよう','あいうえおを いってみよう','Good morning! と いってみよう',
      'ジャンプ 5かい','かたあしだち 5びょう','つまさきで たってみよう','ぐるっと 1かい まわろう',
      'いぬの まねを してみよう','ねこの まねを してみよう'
    ],
    sst: [
      'おもちゃを かりたい。なんて いう？','いっしょに あそびたい。なんて いう？','おともだちと ぶつかった。なんて いう？',
      'おかたづけの じかん。どうする？','おもちゃを こわしちゃった。どうする？','ごはんを たべるときの あいさつは？',
      'ごはんを たべおわったときの あいさつは？','おともだちが おもちゃを かしてくれた。なんて いう？',
      'あさ おきたときの あいさつは？','となりの おともだちの なまえを よんでみよう'
    ],
    event: [
      { text:'1かい おやすみ', effect:'skip', hint:'つぎの じゅんばんは おやすみです' },
      { text:'2ます もどる', effect:'back2', hint:'こまを 2ます もどします' },
      { text:'1ます すすめる', effect:'forward1', hint:'こまを 1ます すすめます' },
      { text:'もういちど サイコロを ふろう', effect:'again', hint:'おだいの あとに もういちど ふれます' },
      { text:'みんなで はくしゅ', effect:'clap', hint:'みんなで パチパチ！' },
      { text:'なにがでるかな？', effect:'randomQuestion', hint:'ほかの おだいカードを 1まい えらびます' }
    ]
  };

  const CATEGORY = {
    start:{icon:"🚩",label:"スタート",color:"#fff7cf"},
    intro:{icon:"👤",label:"自己紹介",color:"#ffe7a3"},
    event:{icon:"⭐",label:"イベント",color:"#ffc4d6"},
    sst:{icon:"💬",label:"SST",color:"#bfe8ff"},
    challenge:{icon:"🎵",label:"チャレンジ",color:"#ccefc5"},
    goal:{icon:"🏁",label:"ゴール",color:"#fff7cf"}
  };

  // 5×4の課題マスを蛇行し、その前後にスタート・ゴールを置く。
  const SPACE_TYPES = [
    "start",
    "intro","sst","challenge","event","intro",
    "sst","challenge","event","intro","sst",
    "challenge","event","intro","sst","challenge",
    "event","intro","sst","challenge","event",
    "goal"
  ];

  const COLORS = ["#e76f51","#4387d6","#62a96b","#8e68c7","#e3a928"];
  const SYMBOLS = ["●","▲","■","★","◆"];

  const els = {
    board: document.getElementById("board"),
    boardWrap: document.getElementById("boardWrap"),
    routeLine: document.getElementById("routeLine"),
    tokens: document.getElementById("tokens"),
    playerList: document.getElementById("playerList"),
    hint: document.getElementById("hint"),
    setup: document.getElementById("setupOverlay"),
    playerCount: document.getElementById("playerCount"),
    nameInputs: document.getElementById("nameInputs"),
    startBtn: document.getElementById("startBtn"),
    diceOverlay: document.getElementById("diceOverlay"),
    bigDie: document.getElementById("bigDie"),
    dicePlayerName: document.getElementById("dicePlayerName"),
    diceMessage: document.getElementById("diceMessage"),
    confirmOverlay: document.getElementById("confirmOverlay"),
    confirmDie: document.getElementById("confirmDie"),
    confirmName: document.getElementById("confirmName"),
    shuffleOverlay: document.getElementById("shuffleOverlay"),
    shuffleCards: [...document.querySelectorAll(".shuffle-card")],
    promptOverlay: document.getElementById("promptOverlay"),
    promptBadge: document.getElementById("promptBadge"),
    promptText: document.getElementById("promptText"),
    closePromptBtn: document.getElementById("closePromptBtn"),
    nextOverlay: document.getElementById("nextOverlay"),
    nextName: document.getElementById("nextName"),
    goalOverlay: document.getElementById("goalOverlay"),
    goalName: document.getElementById("goalName"),
    soundBtn: document.getElementById("soundBtn"),
    settingsBtn: document.getElementById("settingsBtn"),
    resetBtn: document.getElementById("resetBtn")
  };

  let players = [];
  let current = 0;
  let state = "setup";
  let pendingRoll = 1;
  let soundOn = true;
  let audioCtx = null;
  let lastQuestion = {};
  let pendingEvent = null;
  let extraTurn = false;

  function makeBoard(){
    els.board.innerHTML = "";
    SPACE_TYPES.forEach((type,index) => {
      const s = document.createElement("div");
      s.className = `space ${type}`;
      s.dataset.index = index;
      s.style.setProperty("--tilt", `${[-2,1,-1,2,0][index%5]}deg`);
      const info = CATEGORY[type];
      if(type === "start" || type === "goal"){
        s.innerHTML = `<div class="label">${info.icon}<br>${info.label}</div>`;
      } else {
        s.innerHTML = `<div class="icon" aria-label="${info.label}">${info.icon}</div>`;
      }
      const pos = gridPosition(index);
      s.style.gridColumn = pos.col;
      s.style.gridRow = pos.row;
      els.board.appendChild(s);
    });
    requestAnimationFrame(drawRoute);
  }

  // 各段5枚の課題カード。スタートは左上、ゴールは左下に配置。
  function gridPosition(index){
    const rows = [
      [0,1,2,3,4,5],
      [10,9,8,7,6],
      [11,12,13,14,15],
      [21,20,19,18,17,16]
    ];
    for(let r=0;r<rows.length;r++){
      const c = rows[r].indexOf(index);
      if(c !== -1) return {row:r+1,col:c+1};
    }
    return {row:1,col:1};
  }

  function centers(){
    const wrap = els.boardWrap.getBoundingClientRect();
    return [...els.board.children].map(space => {
      const r = space.getBoundingClientRect();
      return {x:r.left-wrap.left+r.width/2,y:r.top-wrap.top+r.height/2};
    });
  }

  function drawRoute(){
    const pts = centers();
    const w = els.boardWrap.clientWidth;
    const h = els.boardWrap.clientHeight;
    els.routeLine.setAttribute("viewBox",`0 0 ${w} ${h}`);
    els.routeLine.innerHTML = `
      <polyline points="${pts.map(p=>`${p.x},${p.y}`).join(" ")}"
        fill="none" stroke="#a4815d" stroke-width="${Math.max(22,w*.034)}"
        stroke-linecap="round" stroke-linejoin="round" opacity=".42"/>
      <polyline points="${pts.map(p=>`${p.x},${p.y}`).join(" ")}"
        fill="none" stroke="#f4d7a7" stroke-width="${Math.max(12,w*.021)}"
        stroke-linecap="round" stroke-linejoin="round" opacity=".76"/>
    `;
    updateAllTokens(false);
  }

  function renderNameInputs(){
    const count = Number(els.playerCount.value);
    const saved = [...els.nameInputs.querySelectorAll("input")].map(i=>i.value);
    els.nameInputs.innerHTML = "";
    for(let i=0;i<count;i++){
      const row = document.createElement("div");
      row.className = "setup-row";
      row.style.gridTemplateColumns = "1fr";
      row.innerHTML = `<label>プレイヤー${i+1}
        <input maxlength="10" value="${escapeHtml(saved[i] || `プレイヤー${i+1}`)}" aria-label="プレイヤー${i+1}の名前">
      </label>`;
      els.nameInputs.appendChild(row);
    }
  }

  function beginGame(){
    const names = [...els.nameInputs.querySelectorAll("input")]
      .map((i,n)=>i.value.trim() || `プレイヤー${n+1}`);
    players = names.map((name,i)=>({name,pos:0,finished:false,skip:false,color:COLORS[i],symbol:SYMBOLS[i]}));
    current = 0;
    lastQuestion = {};
    els.tokens.innerHTML = "";
    players.forEach((p,i)=>{
      const t = document.createElement("div");
      t.className = "token";
      t.id = `token-${i}`;
      t.style.background = p.color;
      t.textContent = p.symbol;
      els.tokens.appendChild(t);
    });
    renderPlayers();
    updateAllTokens(false);
    els.setup.classList.remove("show");
    state = "ready";
    setHint("画面をタップしてサイコロを振ろう");
  }

  function renderPlayers(){
    els.playerList.innerHTML = "";
    players.forEach((p,i)=>{
      const card = document.createElement("div");
      card.className = `player-card ${i===current && !p.finished ? "active":""} ${p.finished?"finished":""}`;
      card.innerHTML = `
        <div class="player-dot" style="background:${p.color}"></div>
        <div>
          <div class="player-name">${escapeHtml(p.name)}</div>
          <div class="status">${p.finished ? "ゴール！" : "すすんでいます"}</div>
        </div>
        <div class="turn-chip">いま</div>`;
      els.playerList.appendChild(card);
    });
  }

  function tokenOffset(playerIndex){
    const presets = [
      [{x:0,y:0}],
      [{x:-12,y:0},{x:12,y:0}],
      [{x:-13,y:-3},{x:13,y:-3},{x:0,y:12}],
      [{x:-14,y:-9},{x:14,y:-9},{x:-14,y:12},{x:14,y:12}],
      [{x:-17,y:-10},{x:0,y:-13},{x:17,y:-10},{x:-10,y:13},{x:10,y:13}]
    ];
    return presets[Math.min(players.length,5)-1][playerIndex] || {x:0,y:0};
  }

  function updateAllTokens(animate=true){
    if(!players.length) return;
    const pts = centers();
    players.forEach((p,i)=>{
      const token = document.getElementById(`token-${i}`);
      if(!token || !pts[p.pos]) return;
      const off = tokenOffset(i);
      token.style.transitionDuration = animate ? ".42s" : "0s";
      token.style.setProperty("--x",`${pts[p.pos].x+off.x}px`);
      token.style.setProperty("--y",`${pts[p.pos].y+off.y}px`);
    });
  }

  async function rollDice(){
    if(state !== "ready" || players[current]?.finished) return;
    state = "rolling";
    setHint("",true);
    els.dicePlayerName.textContent = `${players[current].name}さん`;
    els.diceMessage.textContent = "サイコロを振っています…";
    els.diceOverlay.classList.add("show");
    els.bigDie.classList.add("rolling");

    const cycles = 15;
    for(let i=0;i<cycles;i++){
      const n = 1 + Math.floor(Math.random()*6);
      setDie(els.bigDie,n);
      tone(270 + n*35,.04);
      await sleep(65 + i*7);
    }
    pendingRoll = 1 + Math.floor(Math.random()*6);
    setDie(els.bigDie,pendingRoll);
    els.bigDie.classList.remove("rolling");
    els.diceMessage.textContent = "でた！";
    tone(660,.12);
    await sleep(800);

    els.diceOverlay.classList.remove("show");
    els.confirmName.textContent = `${players[current].name}さん`;
    setDie(els.confirmDie,pendingRoll);
    els.confirmOverlay.classList.add("show");
    state = "confirm";
  }

  async function moveCurrent(){
    if(state !== "confirm") return;
    state = "moving";
    els.confirmOverlay.classList.remove("show");
    const p = players[current];
    const target = Math.min(SPACE_TYPES.length-1,p.pos+pendingRoll);
    while(p.pos < target){
      p.pos++;
      const token = document.getElementById(`token-${current}`);
      updateAllTokens(true);
      token.classList.remove("pulse");
      void token.offsetWidth;
      token.classList.add("pulse");
      tone(370 + p.pos*7,.07);
      await sleep(500);
    }
    renderPlayers();
    if(p.pos === SPACE_TYPES.length-1){
      p.finished = true;
      renderPlayers();
      els.goalName.textContent = `${p.name}さん`;
      els.goalOverlay.classList.add("show");
      tone(523,.12); await sleep(180); tone(659,.12); await sleep(180); tone(784,.24);
      await sleep(2200);
      els.goalOverlay.classList.remove("show");
      await advanceTurn();
      return;
    }
    await showShuffleAndPrompt(SPACE_TYPES[p.pos]);
  }

  async function showShuffle(type, mixed=false){
    state = "shuffle";
    els.shuffleCards.forEach((card,i)=>{
      const cardType = mixed ? ["intro","sst","challenge"][i%3] : type;
      card.style.setProperty("--card-color",CATEGORY[cardType].color);
    });
    els.shuffleOverlay.classList.add("show");
    for(let i=0;i<10;i++){ tone(260+(i%4)*45,.035); await sleep(500); }
    els.shuffleOverlay.classList.remove("show");
  }

  async function showShuffleAndPrompt(type){
    await showShuffle(type,false);

    if(type === "event"){
      const event = chooseQuestion("event");
      if(event.effect === "randomQuestion"){
        els.promptBadge.textContent = `${CATEGORY.event.icon} ${CATEGORY.event.label}`;
        els.promptBadge.style.background = CATEGORY.event.color;
        els.promptText.textContent = event.text;
        els.promptOverlay.classList.add("show");
        tone(620,.12);
        await sleep(1200);
        els.promptOverlay.classList.remove("show");
        await showShuffle("event",true);
        const randomType = ["intro","sst","challenge"][Math.floor(Math.random()*3)];
        const q = chooseQuestion(randomType);
        pendingEvent = null;
        showPrompt(randomType,q);
        return;
      }
      pendingEvent = event;
      showPrompt("event",event.text);
      return;
    }

    pendingEvent = null;
    showPrompt(type,chooseQuestion(type));
  }

  function showPrompt(type,text){
    els.promptBadge.textContent = `${CATEGORY[type].icon} ${CATEGORY[type].label}`;
    els.promptBadge.style.background = CATEGORY[type].color;
    els.promptText.textContent = text;
    els.promptOverlay.classList.add("show");
    state = "prompt";
    tone(620,.12);
  }

  function chooseQuestion(type){
    const list = QUESTIONS[type] || ["みんなで考えてみよう。"];
    let idx = Math.floor(Math.random()*list.length);
    if(list.length > 1 && lastQuestion[type] === idx) idx = (idx+1)%list.length;
    lastQuestion[type] = idx;
    return list[idx];
  }

  async function applyEventEffect(event){
    if(!event) return;
    const p = players[current];
    if(event.effect === "skip") p.skip = true;
    if(event.effect === "again") extraTurn = true;
    if(event.effect === "back2"){
      const target = Math.max(0,p.pos-2);
      while(p.pos > target){ p.pos--; updateAllTokens(true); tone(330,.07); await sleep(500); }
    }
    if(event.effect === "forward1"){
      const target = Math.min(SPACE_TYPES.length-1,p.pos+1);
      while(p.pos < target){ p.pos++; updateAllTokens(true); tone(430,.07); await sleep(500); }
      if(p.pos === SPACE_TYPES.length-1) p.finished = true;
    }
    renderPlayers();
  }

  async function closePrompt(){
    if(state !== "prompt") return;
    els.promptOverlay.classList.remove("show");
    state = "transition";
    const event = pendingEvent;
    pendingEvent = null;
    await applyEventEffect(event);
    if(players[current].finished){
      els.goalName.textContent = `${players[current].name}さん`;
      els.goalOverlay.classList.add("show");
      await sleep(2200);
      els.goalOverlay.classList.remove("show");
    }
    await advanceTurn();
  }

  async function advanceTurn(){
    state = "transition";
    if(players.every(p=>p.finished)){
      els.nextName.textContent = "みんなゴール！";
      els.nextOverlay.classList.add("show");
      await sleep(3000);
      els.nextOverlay.classList.remove("show");
      state = "ended";
      setHint("おつかれさまでした！");
      return;
    }

    if(extraTurn && !players[current].finished){
      extraTurn = false;
      els.nextName.textContent = `${players[current].name}さん もういちど！`;
      els.nextOverlay.classList.add("show");
      await sleep(2500);
      els.nextOverlay.classList.remove("show");
      state = "ready";
      setHint("画面をタップしてサイコロを振ろう");
      return;
    }

    do{
      current = (current + 1) % players.length;
      if(players[current].skip && !players[current].finished){
        players[current].skip = false;
        renderPlayers();
        els.nextName.textContent = `${players[current].name}さんは おやすみ`;
        els.nextOverlay.classList.add("show");
        await sleep(2200);
        els.nextOverlay.classList.remove("show");
      } else if(!players[current].finished){
        break;
      }
    }while(true);

    renderPlayers();
    els.nextName.textContent = `${players[current].name}さん`;
    els.nextOverlay.classList.add("show");
    tone(500,.09);
    await sleep(3000);
    els.nextOverlay.classList.remove("show");
    state = "ready";
    setHint("画面をタップしてサイコロを振ろう");
  }

  function setDie(die,n){
    const patterns = {
      1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]
    };
    [...die.querySelectorAll(".pip")].forEach((p,i)=>p.classList.toggle("on",patterns[n].includes(i)));
    die.setAttribute("aria-label",`サイコロの目 ${n}`);
  }

  function setHint(text,hidden=false){
    els.hint.textContent = text;
    els.hint.classList.toggle("hidden",hidden);
  }

  function tone(freq,duration){
    if(!soundOn) return;
    try{
      audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine"; o.frequency.value = freq;
      g.gain.setValueAtTime(.055,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+duration);
    }catch(e){}
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
  }
  const sleep = ms => new Promise(r=>setTimeout(r,ms));

  els.playerCount.addEventListener("change",renderNameInputs);
  els.startBtn.addEventListener("click",e=>{e.stopPropagation();beginGame();});
  els.closePromptBtn.addEventListener("click",e=>{e.stopPropagation();closePrompt();});
  els.soundBtn.addEventListener("click",e=>{
    e.stopPropagation();soundOn=!soundOn;els.soundBtn.textContent=soundOn?"🔊":"🔇";
  });
  els.settingsBtn.addEventListener("click",e=>{
    e.stopPropagation();
    if(["rolling","moving","shuffle","prompt","confirm","transition"].includes(state)) return;
    els.setup.classList.add("show");state="setup";
  });
  els.resetBtn.addEventListener("click",e=>{
    e.stopPropagation();
    if(confirm("最初からやり直しますか？")){
      els.setup.classList.add("show");state="setup";
    }
  });

  let pointerStart = null;

  function runPrimaryAction(target){
    if(target && target.closest("button,input,select,label,.players,.topbar")) return;
    if(state==="ready") rollDice();
    else if(state==="confirm") moveCurrent();
  }

  document.addEventListener("pointerdown",e=>{
    if(e.target.closest("button,input,select,label,.players,.topbar")) return;
    pointerStart = {x:e.clientX,y:e.clientY,time:Date.now(),target:e.target};
  },{passive:true});

  document.addEventListener("pointerup",e=>{
    if(!pointerStart) return;
    const dx = e.clientX - pointerStart.x;
    const dy = e.clientY - pointerStart.y;
    const distance = Math.hypot(dx,dy);
    const elapsed = Date.now() - pointerStart.time;

    // 短いタップだけをゲーム操作として扱う。
    // スワイプはiPhoneで画面をスクロールするために使う。
    if(elapsed < 1200 && distance < 35){
      runPrimaryAction(pointerStart.target);
    }
    pointerStart = null;
  },{passive:true});

  document.addEventListener("pointercancel",()=>{ pointerStart = null; },{passive:true});

  window.addEventListener("resize",()=>requestAnimationFrame(drawRoute));
  makeBoard();
  renderNameInputs();
})();
</script>
</body>
</html>
